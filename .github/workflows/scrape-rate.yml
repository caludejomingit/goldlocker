name: Scrape Kerala gold rate

on:
  schedule:
    # 4x/day: 03:00, 09:00, 15:00, 21:00 UTC (~08:30, 14:30, 20:30, 02:30 IST)
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        id: scrape
        run: node scripts/scrape-rate.mjs

      - name: Commit updated data
        if: steps.scrape.outputs.changed == 'true'
        run: |
          git config user.name "goldlocker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/kerala-rate.json
          git commit -m "Update Kerala gold rate data [automated]"
          git push
