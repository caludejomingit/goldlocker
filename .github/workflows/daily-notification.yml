name: Daily 10 AM rate notification

on:
  schedule:
    # 04:30 UTC = 10:00 AM IST
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh today's rate first
        id: scrape
        run: node scripts/scrape-rate.mjs

      - name: Commit updated data
        if: steps.scrape.outputs.changed == 'true'
        run: |
          git config user.name "goldlocker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/kerala-rate.json
          git commit -m "Update Kerala gold rate data [automated]"
          git push

      - name: Install push dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Send notification
        run: node scripts/send-daily-notification.mjs
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
